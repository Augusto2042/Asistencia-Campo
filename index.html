<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación de Marcaje - QR DINÁMICO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background: #1a73e8; 
            color: white; 
            margin: 0; 
        }
        .qr-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }
        h1 { margin-bottom: 10px; font-size: 2.5rem; }
        p { font-size: 1.2rem; margin-bottom: 20px; opacity: 0.9; }
        #timer { margin-top: 25px; font-size: 1rem; opacity: 0.8; }
        .reloj { 
            font-size: 4rem; 
            font-weight: bold; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="reloj" id="relojActual">00:00:00</div>
    <h1>ESCANEA PARA MARCAR</h1>
    <p>Usa la cámara de tu celular para registrar Entrada o Salida</p>
    
    <div class="qr-card">
        <div id="qrcode"></div>
    </div>
    
    <div id="timer">⚠️ El código de seguridad se actualiza automáticamente cada hora.</div>

    <script>
        // Inicializar el generador de QR
        let qr = new QRCode(document.getElementById("qrcode"), { 
            width: 350, 
            height: 350,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
        
        function actualizarSistema() {
            const ahora = new Date();
            
            // 1. Actualizar el reloj visual
            document.getElementById('relojActual').innerText = ahora.toLocaleTimeString('es-CL');

            // 2. TOKEN DINÁMICO: Cambia cada hora exacta
            // Esto evita que alguien marque asistencia con una foto del QR de ayer o de la mañana
            const tokenSeguridad = "SEC-" + ahora.getFullYear() + ahora.getMonth() + ahora.getDate() + ahora.getHours();
            
            // 3. Construir la URL con el token
            // IMPORTANTE: Asegúrate de que esta URL sea la de tu página de GitHub
            const urlBase = "https://augusto2042.github.io/Asistencia-Campo/credencial_qr.html";
            const urlFinal = `${urlBase}?token=${tokenSeguridad}`;
            
            // 4. Generar el nuevo QR
            qr.makeCode(urlFinal);
        }

        // Ejecutar actualización cada segundo para el reloj
        setInterval(actualizarSistema, 1000);
        
        // Ejecución inicial
        actualizarSistema();
    </script>
</body>
</html>
