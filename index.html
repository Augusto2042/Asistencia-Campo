<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Asistencia - Agrifrut</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #002f6c; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #clock { font-size: 5rem; font-weight: bold; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        #date { font-size: 1.5rem; opacity: 0.8; margin-bottom: 30px; text-transform: capitalize; }
        .qr-wrapper { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: inline-block; }
        .instrucciones { margin-top: 30px; font-size: 1.2rem; max-width: 400px; line-height: 1.5; }
        .logo-placeholder { font-size: 2.2rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 20px; color: #4dabf7; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">AGRIFRUT</div>
        <div id="clock">00:00:00</div>
        <div id="date">Cargando fecha...</div>
        
        <div class="qr-wrapper">
            <div id="qrcode"></div>
        </div>

        <div class="instrucciones">
            Escanee el código QR con su celular para marcar su asistencia de hoy.
        </div>
    </div>

    <script>
        function updateClock() {
            const ahora = new Date();
            document.getElementById('clock').innerText = ahora.toLocaleTimeString('es-CL');
            document.getElementById('date').innerText = ahora.toLocaleDateString('es-CL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function generateQR() {
            const qrcodeDiv = document.getElementById("qrcode");
            qrcodeDiv.innerHTML = ""; 

            const ahora = new Date();
            const token = "SEC-" + ahora.getFullYear() + ahora.getMonth() + ahora.getDate() + ahora.getHours();
            
            // URL CORREGIDA A MINÚSCULAS
            const url = `https://agrifrut.github.io/Asistencia-Campo/credencial_qr.html?token=${token}`;

            new QRCode(qrcodeDiv, {
                text: url,
                width: 250,
                height: 250,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        setInterval(updateClock, 1000);
        updateClock();
        generateQR();
        setInterval(generateQR, 1000 * 60 * 30);
    </script>
</body>
</html>
