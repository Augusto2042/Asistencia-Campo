<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación de Marcaje</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a73e8; color: white; margin: 0; }
        .qr-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .reloj { font-size: 4rem; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="reloj" id="reloj">00:00:00</div>
    <h1>ESCANEA AQUÍ</h1>
    <div class="qr-card"><div id="qrcode"></div></div>
    <script>
        let qr = new QRCode(document.getElementById("qrcode"), { width: 350, height: 350 });
        function actualizar() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
            const token = "SEC-" + ahora.getFullYear() + ahora.getMonth() + ahora.getDate() + ahora.getHours();
            const url = `https://augusto2042.github.io/Asistencia-Campo/credencial_qr.html?token=${token}`;
            qr.makeCode(url);
        }
        setInterval(actualizar, 1000);
        actualizar();
    </script>
</body>
</html>
