<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Asistencia</title>
    <style>
        body { font-family: sans-serif; background: #1a73e8; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .btn-in { background: #28a745; }
        .btn-out { background: #dc3545; }
        #mensaje { margin-top: 20px; text-align: center; font-weight: bold; padding: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>📝 Registro Diario</h2>
    <div id="form-container">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="apellido" placeholder="Apellido">
        <input type="text" id="rut" placeholder="RUT">
        <div class="btn-group">
            <button class="btn-in" onclick="enviar('entrada')">ENTRADA</button>
            <button class="btn-out" onclick="enviar('salida')">SALIDA</button>
        </div>
    </div>
    <div id="mensaje"></div>
</div>

<script>
    const URL = "https://ccogvshatmpjgvkzpkov.supabase.co";
    const KEY = "sb_publishable_ZiqEP4XQoXAN5Y428lE4TA_W2-y-QsT";

    async function enviar(tipo) {
        const n = document.getElementById('nombre').value.trim();
        const a = document.getElementById('apellido').value.trim();
        const r = document.getElementById('rut').value.trim();
        if(!n || !a || !r) return alert("Completa los datos");

        const msg = document.getElementById('mensaje');
        msg.style.display = "block";
        msg.innerText = "⏳ Registrando...";
        msg.style.background = "#fff3cd";

        const ahora = new Date();
        const datos = {
            nombre: n,
            apellido: a,
            rut: r,
            fecha: ahora.toLocaleDateString('es-CL')
        };
        datos[tipo] = ahora.toLocaleTimeString('es-CL');

        try {
            const res = await fetch(`${URL}/rest/v1/asistencia`, {
                method: "POST",
                headers: {
                    "apikey": KEY,
                    "Authorization": `Bearer ${KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(datos)
            });

            if(res.ok) {
                msg.innerText = "✅ ¡EXITOSO!";
                msg.style.background = "#d4edda";
                document.getElementById('form-container').style.display = "none";
            } else {
                const error = await res.json();
                msg.innerText = "❌ ERROR: " + error.message;
                msg.style.background = "#f8d7da";
            }
        } catch (e) {
            msg.innerText = "❌ ERROR DE CONEXIÓN";
            msg.style.background = "#f8d7da";
        }
    }
</script>
</body>
</html>
